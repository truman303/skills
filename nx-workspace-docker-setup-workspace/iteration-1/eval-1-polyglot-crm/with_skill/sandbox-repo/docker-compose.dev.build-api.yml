# One-shot build compose file for the .NET webapi `pollen-api`. Kept separate
# from docker-compose.dev.build.yml (which builds the Angular app `pollen`) so
# it's always obvious which target a given `docker compose up` is running.
# `@nx/dotnet`'s project inference exposes `nx build pollen-api` automatically
# once the `.csproj` exists under apps/pollen-api/.
version: '3.8'

services:
  nx-build-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/usr/src/app
      - nx_node_modules:/usr/src/app/node_modules
      - nx_dist:/usr/src/app/dist
    working_dir: /usr/src/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: nx build pollen-api

volumes:
  nx_node_modules:
  nx_dist:
