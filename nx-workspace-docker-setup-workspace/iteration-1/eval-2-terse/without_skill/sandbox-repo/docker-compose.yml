services:
  # One-shot / interactive dev shell. Run with:
  #   docker compose run --rm --service-ports dev
  # and you'll drop into a bash prompt inside /workspace with both
  # `nx` and `dotnet` available.
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: nx-ng-dotnet-dev:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
      # Keep node_modules inside a named volume so host/container OS
      # differences don't clobber native deps (e.g. esbuild binaries).
      - node_modules:/workspace/node_modules
    ports:
      - "4200:4200"   # Angular (nx serve web)
      - "5000:5000"   # .NET HTTP
      - "5001:5001"   # .NET HTTPS
      - "7000:7000"   # .NET dev HTTP
      - "7001:7001"   # .NET dev HTTPS
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - NX_DAEMON=false
    stdin_open: true
    tty: true
    command: bash

  # Long-running services for `docker compose up`. These assume the
  # workspace has already been generated (see PLAN.md) and that projects
  # named `web` (Angular) and `api` (.NET) exist.
  web:
    extends:
      service: dev
    command: nx serve web --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"

  api:
    extends:
      service: dev
    command: nx serve api
    ports:
      - "5000:5000"
      - "5001:5001"

volumes:
  node_modules:
