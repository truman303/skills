# Day-to-day dev server. `nx serve` with --host 0.0.0.0 so the Angular app is
# reachable from the host at http://localhost:4200. File watching works via
# CHOKIDAR_USEPOLLING=true because bind mounts don't reliably deliver inotify
# events across the WSL2 / macOS virtualization boundary.
version: '3.8'

services:
  nx-serve:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/usr/src/app
      - nx_node_modules:/usr/src/app/node_modules
      - nx_dist:/usr/src/app/dist
    ports:
      - "4200:4200"
    working_dir: /usr/src/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    # Replace `my-app` with your Angular app name. Use --host 0.0.0.0 so Docker
    # port-forwarding actually reaches the dev server (default 127.0.0.1 only
    # binds inside the container and is unreachable from the host).
    command: nx serve my-app --host 0.0.0.0

volumes:
  nx_node_modules:
  nx_dist:
