name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  CI: 'true'
  # Silence dotnet first-run telemetry banner in CI logs
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Use a workspace-local NuGet cache so actions/cache can pick it up
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # NX cloud access token
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      # --- Nx Cloud distributed task execution (DTE) ----------------------
      # Run this BEFORE installing dependencies so agents pick up the run.
      # Connect the workspace first with `npx nx connect` (writes nxCloudId
      # to nx.json), then uncomment the line below.
      # Docs: https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          # Matches the TargetFramework=net10.0 used by the .csproj files
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install Node dependencies
        run: npm ci

      - name: Derive NX_BASE / NX_HEAD for affected
        uses: nrwl/nx-set-shas@v5

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Format check
        run: npx nx format:check

      # `nx affected` skips projects that don't define a target, so this single
      # command lints + tests Angular projects, builds Angular + .NET projects,
      # and runs Playwright e2e — all only for what actually changed.
      - name: Lint, test, build and e2e (affected)
        run: npx nx affected -t lint test build e2e

      # Nx Cloud's self-healing CI surfaces fix suggestions for failed tasks.
      # No-op when the workspace isn't connected to Nx Cloud yet.
      - name: Self-healing CI
        if: always()
        run: npx nx fix-ci
